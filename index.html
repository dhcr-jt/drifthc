<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advena Living — Campaign Report</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f3ef;
    color: #2c2c2c;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 48px 40px 80px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 2px solid #d6cebc;
  }

  header h1 {
    font-family: 'Lora', serif;
    font-size: 1.7rem;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: -0.01em;
  }

  header h1 span { font-style: italic; color: #8a6d3b; }

  .period {
    font-size: 0.75rem;
    color: #8a8070;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .report-date {
    font-size: 0.75rem;
    color: #8a8070;
    text-align: right;
    letter-spacing: 0.04em;
  }

  /* ── KPI Strip ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: #d6cebc;
    border: 1px solid #d6cebc;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .kpi {
    background: #fff;
    padding: 18px 20px;
  }

  .kpi-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #9a9080;
    margin-bottom: 6px;
  }

  .kpi-val {
    font-family: 'Lora', serif;
    font-size: 1.55rem;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1;
  }

  .kpi-val.gold { color: #8a6d3b; }
  .kpi-val.green { color: #3a7d5a; }

  /* ── Facility Block ── */
  .facility {
    margin-bottom: 32px;
    background: #fff;
    border: 1px solid #d6cebc;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .facility-header {
    background: #faf8f4;
    border-bottom: 1px solid #e8e0d0;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .facility-name {
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-weight: 600;
    color: #1a1a1a;
  }

  .facility-totals {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .fac-total {
    font-size: 0.75rem;
    color: #6a6050;
  }

  .fac-total strong {
    font-size: 0.88rem;
    font-weight: 600;
    color: #1a1a1a;
    margin-left: 4px;
  }

  .fac-total.gold strong { color: #8a6d3b; }
  .fac-total.green strong { color: #3a7d5a; }

  /* ── Table ── */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    padding: 10px 22px;
    text-align: left;
    font-size: 0.67rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #9a9080;
    font-weight: 500;
    background: #fdf9f4;
    border-bottom: 1px solid #e8e0d0;
    white-space: nowrap;
  }

  thead th:not(:first-child) { text-align: right; }

  tbody tr {
    border-bottom: 1px solid #f0ebe0;
    transition: background 0.12s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fdf9f2; }

  tbody tr.inactive { opacity: 0.45; }

  td {
    padding: 11px 22px;
    color: #2c2c2c;
    white-space: nowrap;
  }

  td:not(:first-child) { text-align: right; }

  .pos-pill {
    display: inline-block;
    background: #f0ebe0;
    border: 1px solid #d6cebc;
    border-radius: 4px;
    padding: 2px 9px;
    font-size: 0.72rem;
    font-weight: 500;
    color: #5a5040;
    letter-spacing: 0.03em;
  }

  .inactive-label {
    font-size: 0.65rem;
    color: #b0a090;
    margin-left: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .dash { color: #c0b8a8; }

  .qual-cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }

  .qual-track {
    width: 52px;
    height: 4px;
    background: #ece7da;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .qual-fill {
    height: 100%;
    border-radius: 2px;
  }

  .qual-high   { background: #3a7d5a; }
  .qual-mid    { background: #c8a050; }
  .qual-low    { background: #c07050; }

  /* ── Footer ── */
  footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid #d6cebc;
    font-size: 0.72rem;
    color: #aaa090;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  @media (max-width: 760px) {
    body { padding: 24px 16px 60px; }
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Advena <span>Living</span></h1>
    <p class="period">Campaign Performance Report &nbsp;·&nbsp; Feb 26 – Mar 19, 2026</p>
  </div>
  <div class="report-date">Ad Set Level · Facebook Ads</div>
</header>

<div class="kpi-strip" id="kpiStrip"></div>

<div id="facilities"></div>

<footer>
  <span>Source: Facebook Ads Manager export</span>
  <span>Reporting window: Feb 26 – Mar 19, 2026 &nbsp;·&nbsp; Attribution: 7-day click or 1-day view</span>
</footer>

<script>
const raw = [
  { facility:"Bonner Springs",  position:"CMA",      status:"active",   spend:33.65,  cpr:8.41,  leads:4,  qualRate:25,  cpqc:0.03 },
  { facility:"Bonner Springs",  position:"CNA",      status:"active",   spend:63.32,  cpr:3.17,  leads:20, qualRate:90,  cpqc:0.28 },
  { facility:"Bonner Springs",  position:"RN",       status:"active",   spend:0.35,   cpr:null,  leads:0,  qualRate:null,cpqc:null },

  { facility:"Clearwater",      position:"CMA",      status:"active",   spend:25.11,  cpr:6.28,  leads:4,  qualRate:100, cpqc:0.16 },
  { facility:"Clearwater",      position:"CNA",      status:"active",   spend:73.23,  cpr:4.07,  leads:18, qualRate:61,  cpqc:0.15 },
  { facility:"Clearwater",      position:"RN & LPN", status:"active",   spend:4.88,   cpr:null,  leads:0,  qualRate:null,cpqc:null },
  { facility:"Clearwater",      position:"RN",       status:"inactive", spend:0.00,   cpr:null,  leads:0,  qualRate:null,cpqc:null },

  { facility:"Fountainview",    position:"CMA",      status:"active",   spend:40.03,  cpr:3.64,  leads:11, qualRate:82,  cpqc:0.22 },
  { facility:"Fountainview",    position:"CNA",      status:"active",   spend:48.42,  cpr:2.85,  leads:17, qualRate:100, cpqc:0.35 },
  { facility:"Fountainview",    position:"LPN",      status:"inactive", spend:2.83,   cpr:null,  leads:0,  qualRate:null,cpqc:null },
  { facility:"Fountainview",    position:"RN & LPN", status:"active",   spend:0.54,   cpr:null,  leads:0,  qualRate:null,cpqc:null },
  { facility:"Fountainview",    position:"RN",       status:"inactive", spend:0.10,   cpr:null,  leads:0,  qualRate:null,cpqc:null },

  { facility:"On Tenth",        position:"CMA",      status:"active",   spend:4.17,   cpr:4.17,  leads:1,  qualRate:100, cpqc:0.24 },
  { facility:"On Tenth",        position:"CNA",      status:"active",   spend:92.29,  cpr:2.88,  leads:32, qualRate:94,  cpqc:0.33 },
  { facility:"On Tenth",        position:"RN & LPN", status:"active",   spend:2.19,   cpr:null,  leads:0,  qualRate:null,cpqc:null },

  { facility:"Woodlawn",        position:"CNA",      status:"active",   spend:89.02,  cpr:3.18,  leads:28, qualRate:100, cpqc:0.31 },
  { facility:"Woodlawn",        position:"RN & LPN", status:"active",   spend:12.01,  cpr:12.01, leads:1,  qualRate:100, cpqc:0.08 },
];

const facilities = [...new Set(raw.map(r=>r.facility))];

// ── KPI Strip ──
const totSpend  = raw.reduce((s,r)=>s+r.spend,0);
const totLeads  = raw.reduce((s,r)=>s+r.leads,0);
const totQual   = raw.reduce((s,r)=>s+(r.leads*(r.qualRate||0)/100),0);
const avgCPL    = totLeads ? totSpend/totLeads : 0;
const overallQR = totLeads ? Math.round(totQual/totLeads*100) : 0;

document.getElementById('kpiStrip').innerHTML = [
  { label:"Total Amount Spent",       val:`$${totSpend.toFixed(2)}`,  cls:'' },
  { label:"Total Leads",              val:totLeads,                   cls:'gold' },
  { label:"Avg Cost per Result",      val:`$${avgCPL.toFixed(2)}`,    cls:'' },
  { label:"Overall Qual. Rate",       val:`${overallQR}%`,            cls:'green' },
  { label:"Active Facilities",        val:facilities.length,          cls:'' },
].map(k=>`
  <div class="kpi">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-val ${k.cls}">${k.val}</div>
  </div>`).join('');

// ── Facility Blocks ──
const container = document.getElementById('facilities');

facilities.forEach((fac, fi) => {
  const rows  = raw.filter(r=>r.facility===fac);
  const fSpend = rows.reduce((s,r)=>s+r.spend,0);
  const fLeads = rows.reduce((s,r)=>s+r.leads,0);
  const fQual  = rows.reduce((s,r)=>s+(r.leads*(r.qualRate||0)/100),0);
  const fQR    = fLeads ? Math.round(fQual/fLeads*100) : null;
  const fCPL   = fLeads ? fSpend/fLeads : null;

  const totalsHtml = `
    <div class="facility-totals">
      <span class="fac-total gold">Amount Spent <strong>$${fSpend.toFixed(2)}</strong></span>
      <span class="fac-total">Leads <strong>${fLeads}</strong></span>
      <span class="fac-total">${fCPL!==null?`Cost / Lead <strong>$${fCPL.toFixed(2)}</strong>`:'Cost / Lead <strong>—</strong>'}</span>
      <span class="fac-total green">${fQR!==null?`Qual. Rate <strong>${fQR}%</strong>`:'Qual. Rate <strong>—</strong>'}</span>
    </div>`;

  const rowsHtml = rows.map(r => {
    const inactive = r.status==='inactive';
    const cpr  = r.cpr!==null   ? `$${r.cpr.toFixed(2)}`   : `<span class="dash">—</span>`;
    const leads= r.leads>0      ? r.leads                   : `<span class="dash">—</span>`;
    const cpqc = r.cpqc!==null  ? `$${r.cpqc.toFixed(2)}`  : `<span class="dash">—</span>`;

    let qrCell = `<span class="dash">—</span>`;
    if (r.qualRate !== null) {
      const cls = r.qualRate>=80 ? 'qual-high' : r.qualRate>=50 ? 'qual-mid' : 'qual-low';
      qrCell = `<div class="qual-cell">
        <div class="qual-track"><div class="qual-fill ${cls}" style="width:${r.qualRate}%"></div></div>
        ${r.qualRate}%
      </div>`;
    }

    return `
      <tr class="${inactive?'inactive':''}">
        <td>
          <span class="pos-pill">${r.position}</span>
          ${inactive?'<span class="inactive-label">Inactive</span>':''}
        </td>
        <td>$${r.spend.toFixed(2)}</td>
        <td>${cpr}</td>
        <td>${leads}</td>
        <td>${qrCell}</td>
        <td>${cpqc}</td>
      </tr>`;
  }).join('');

  const el = document.createElement('div');
  el.className = 'facility';
  el.style.animationDelay = `${fi * 0.07}s`;
  el.innerHTML = `
    <div class="facility-header">
      <div class="facility-name">Advena Living — ${fac}</div>
      ${totalsHtml}
    </div>
    <table>
      <thead>
        <tr>
          <th>Position</th>
          <th>Amount Spent</th>
          <th>Cost per Result</th>
          <th>Leads</th>
          <th>Qual. Candidate Rate</th>
          <th>Cost per Qual. Candidate</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
  container.appendChild(el);
});
</script>
</body>
</html>
