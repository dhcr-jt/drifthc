<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advena Living — Ad Set Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2c38;
    --accent: #c8a96e;
    --accent2: #7eb8a0;
    --accent3: #e07070;
    --text: #e8e4dc;
    --text-muted: #7a7e91;
    --text-dim: #4a4e61;
    --active: #2e9e78;
    --inactive: #8a3535;
    --card-glow: 0 0 0 1px var(--border), 0 4px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* ── Header ── */
  header {
    position: relative;
    padding: 48px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    z-index: 1;
  }

  .header-glow {
    position: absolute;
    top: -60px; left: -60px;
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-area h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.1;
    color: var(--text);
  }

  .logo-area h1 span { color: var(--accent); }

  .logo-area .subtitle {
    margin-top: 6px;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .period-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .period-badge strong { color: var(--accent); font-weight: 500; }

  /* ── Main Layout ── */
  main {
    position: relative;
    z-index: 1;
    padding: 40px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Section titles ── */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    font-style: italic;
    color: var(--text-muted);
    margin-bottom: 20px;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── KPI Row ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    box-shadow: var(--card-glow);
    animation: fadeUp 0.5s ease both;
  }

  .kpi-card:nth-child(1) { animation-delay: 0.05s; }
  .kpi-card:nth-child(2) { animation-delay: 0.1s; }
  .kpi-card:nth-child(3) { animation-delay: 0.15s; }
  .kpi-card:nth-child(4) { animation-delay: 0.2s; }
  .kpi-card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .kpi-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .kpi-value {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    line-height: 1;
    color: var(--text);
  }

  .kpi-value.accent { color: var(--accent); }
  .kpi-value.green  { color: var(--accent2); }

  .kpi-sub {
    margin-top: 6px;
    font-size: 0.74rem;
    color: var(--text-dim);
  }

  /* ── Charts row ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 48px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--card-glow);
    animation: fadeUp 0.5s ease 0.3s both;
  }

  .chart-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* Bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: 12px; }

  .bar-row { display: flex; align-items: center; gap: 10px; }

  .bar-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    width: 130px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    flex: 1;
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
    width: 0;
  }

  .bar-val {
    font-size: 0.74rem;
    color: var(--text);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Donut chart */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .donut-svg { flex-shrink: 0; }

  .donut-legend { display: flex; flex-direction: column; gap: 12px; }

  .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-name { color: var(--text-muted); }
  .legend-val  { margin-left: auto; color: var(--text); font-weight: 500; padding-left: 16px; }

  /* ── Table ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--card-glow);
    animation: fadeUp 0.5s ease 0.4s both;
    margin-bottom: 48px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  thead th {
    padding: 14px 18px;
    text-align: left;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }

  thead th:hover { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }

  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 13px 18px;
    color: var(--text);
    white-space: nowrap;
  }

  .td-muted { color: var(--text-muted); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .badge-active   { background: rgba(46,158,120,0.15); color: var(--active); border: 1px solid rgba(46,158,120,0.25); }
  .badge-inactive { background: rgba(138,53,53,0.15);  color: #d07070;       border: 1px solid rgba(138,53,53,0.25); }

  .badge-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  .role-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .qual-bar-mini {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qual-track-mini {
    width: 60px;
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .qual-fill-mini {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  /* ── Location breakdown ── */
  .location-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 0;
  }

  .location-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    box-shadow: var(--card-glow);
    animation: fadeUp 0.5s ease 0.5s both;
  }

  .loc-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .loc-stats { display: flex; flex-direction: column; gap: 8px; }

  .loc-stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
  }

  .loc-stat-label { color: var(--text-muted); }
  .loc-stat-val   { color: var(--text); font-weight: 500; }
  .loc-stat-val.accent { color: var(--accent); }
  .loc-stat-val.green  { color: var(--accent2); }

  @media (max-width: 900px) {
    header { padding: 28px 20px 20px; }
    main   { padding: 28px 20px; }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-glow"></div>
  <div class="logo-area">
    <h1>Advena <span>Living</span></h1>
    <p class="subtitle">Ad Set Performance Report &nbsp;·&nbsp; Facebook Campaigns</p>
  </div>
  <div class="period-badge">
    Reporting period &nbsp;<strong>Feb 26 – Mar 19, 2026</strong>
  </div>
</header>

<main>

  <!-- KPIs -->
  <p class="section-title">Overview</p>
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Charts -->
  <p class="section-title">Performance Breakdown</p>
  <div class="charts-row">
    <div class="chart-card">
      <p class="chart-title">Leads by Ad Set (Top Active)</p>
      <div class="bar-chart" id="leadsBarChart"></div>
    </div>
    <div class="chart-card">
      <p class="chart-title">Spend by Location</p>
      <div class="donut-wrap">
        <svg class="donut-svg" id="donutSvg" width="160" height="160" viewBox="0 0 160 160"></svg>
        <div class="donut-legend" id="donutLegend"></div>
      </div>
    </div>
  </div>

  <!-- Table -->
  <p class="section-title">Ad Set Detail</p>
  <div class="table-card">
    <table id="adTable">
      <thead>
        <tr>
          <th>Ad Set</th>
          <th>Role</th>
          <th>Status</th>
          <th>Leads</th>
          <th>Qualified</th>
          <th>Qual. Rate</th>
          <th>Impressions</th>
          <th>Reach</th>
          <th>Cost / Lead</th>
          <th>Spend</th>
        </tr>
      </thead>
      <tbody id="adTableBody"></tbody>
    </table>
  </div>

  <!-- Location Summary -->
  <p class="section-title">By Location</p>
  <div class="location-grid" id="locationGrid"></div>

</main>

<script>
const data = [
  { campaign:"Bonner Springs", adSet:"Bonner Springs (CMA)", role:"CMA", status:"active", leads:4, qualified:1, qualRate:25, cpr:8.41, spend:33.65, impressions:1791, reach:950 },
  { campaign:"Bonner Springs", adSet:"Bonner Springs (CNA)", role:"CNA", status:"active", leads:20, qualified:18, qualRate:90, cpr:3.17, spend:63.32, impressions:4211, reach:1926 },
  { campaign:"Bonner Springs", adSet:"Bonner Springs (RN)",  role:"RN",  status:"active", leads:0, qualified:0, qualRate:null, cpr:null, spend:0.35, impressions:27, reach:21 },

  { campaign:"Clearwater", adSet:"Clearwater (CMA)", role:"CMA", status:"active", leads:4, qualified:4, qualRate:100, cpr:6.28, spend:25.11, impressions:1369, reach:837 },
  { campaign:"Clearwater", adSet:"Clearwater (CNA)", role:"CNA", status:"active", leads:18, qualified:11, qualRate:61, cpr:4.07, spend:73.23, impressions:5198, reach:2867 },
  { campaign:"Clearwater", adSet:"Clearwater (RN & LPN)", role:"RN & LPN", status:"active", leads:0, qualified:0, qualRate:null, cpr:null, spend:4.88, impressions:342, reach:191 },
  { campaign:"Clearwater", adSet:"Clearwater (RN) ×", role:"RN", status:"inactive", leads:0, qualified:0, qualRate:null, cpr:null, spend:0.00, impressions:1, reach:1 },

  { campaign:"Fountainview", adSet:"Fountainview (CMA)", role:"CMA", status:"active", leads:11, qualified:9, qualRate:82, cpr:3.64, spend:40.03, impressions:2917, reach:1634 },
  { campaign:"Fountainview", adSet:"Fountainview (CNA)", role:"CNA", status:"active", leads:17, qualified:17, qualRate:100, cpr:2.85, spend:48.42, impressions:3880, reach:1979 },
  { campaign:"Fountainview", adSet:"Fountainview (LPN) ×", role:"LPN", status:"inactive", leads:0, qualified:0, qualRate:null, cpr:null, spend:2.83, impressions:154, reach:117 },
  { campaign:"Fountainview", adSet:"Fountainview (RN & LPN)", role:"RN & LPN", status:"active", leads:0, qualified:0, qualRate:null, cpr:null, spend:0.54, impressions:30, reach:24 },
  { campaign:"Fountainview", adSet:"Fountainview (RN) ×", role:"RN", status:"inactive", leads:0, qualified:0, qualRate:null, cpr:null, spend:0.10, impressions:13, reach:6 },

  { campaign:"On Tenth",  adSet:"On Tenth (CMA)", role:"CMA", status:"active", leads:1, qualified:1, qualRate:100, cpr:4.17, spend:4.17, impressions:218, reach:86 },
  { campaign:"On Tenth",  adSet:"On Tenth (CNA)", role:"CNA", status:"active", leads:32, qualified:30, qualRate:94, cpr:2.88, spend:92.29, impressions:7462, reach:2434 },
  { campaign:"On Tenth",  adSet:"On Tenth (RN & LPN)", role:"RN & LPN", status:"active", leads:0, qualified:0, qualRate:null, cpr:null, spend:2.19, impressions:132, reach:68 },

  { campaign:"Woodlawn", adSet:"Woodlawn (CNA)", role:"CNA", status:"active", leads:28, qualified:28, qualRate:100, cpr:3.18, spend:89.02, impressions:6426, reach:2726 },
  { campaign:"Woodlawn", adSet:"Woodlawn (RN & LPN)", role:"RN & LPN", status:"active", leads:1, qualified:1, qualRate:100, cpr:12.01, spend:12.01, impressions:601, reach:393 },
];

// ── KPIs ──
const totalLeads    = data.reduce((s,r)=>s+r.leads,0);
const totalQual     = data.reduce((s,r)=>s+r.qualified,0);
const totalSpend    = data.reduce((s,r)=>s+r.spend,0);
const totalImpr     = data.reduce((s,r)=>s+r.impressions,0);
const totalReach    = data.reduce((s,r)=>s+r.reach,0);
const avgCPL        = totalLeads ? (totalSpend / totalLeads) : 0;
const overallQR     = totalLeads ? Math.round(totalQual/totalLeads*100) : 0;
const activeCount   = data.filter(r=>r.status==='active').length;

const kpis = [
  { label:"Total Leads",      val: totalLeads,                    cls:"accent",  sub:`${totalQual} qualified` },
  { label:"Total Spend",      val:`$${totalSpend.toFixed(2)}`,   cls:"",        sub:"across all ad sets" },
  { label:"Avg Cost / Lead",  val:`$${avgCPL.toFixed(2)}`,       cls:"green",   sub:"active converting sets" },
  { label:"Qual. Rate",       val:`${overallQR}%`,               cls:"accent",  sub:"leads → qualified" },
  { label:"Impressions",      val:totalImpr.toLocaleString(),     cls:"",        sub:`${totalReach.toLocaleString()} reached` },
];

const kpiGrid = document.getElementById('kpiGrid');
kpis.forEach((k,i) => {
  kpiGrid.innerHTML += `
    <div class="kpi-card" style="animation-delay:${0.05+i*0.05}s">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value ${k.cls}">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`;
});

// ── Bar Chart: leads by active converting ad sets ──
const converting = data.filter(r=>r.leads>0&&r.status==='active').sort((a,b)=>b.leads-a.leads);
const maxLeads   = converting[0].leads;
const barChart   = document.getElementById('leadsBarChart');
converting.forEach(r => {
  const pct = Math.round(r.leads/maxLeads*100);
  barChart.innerHTML += `
    <div class="bar-row">
      <span class="bar-label" title="${r.adSet}">${r.campaign} <span style="opacity:.5">(${r.role})</span></span>
      <div class="bar-track"><div class="bar-fill" data-w="${pct}%"></div></div>
      <span class="bar-val">${r.leads}</span>
    </div>`;
});

// animate bars
requestAnimationFrame(()=>{
  document.querySelectorAll('.bar-fill').forEach(el=>{
    setTimeout(()=>{ el.style.width = el.dataset.w; },80);
  });
});

// ── Donut: spend by location ──
const campaigns   = [...new Set(data.map(r=>r.campaign))];
const palette     = ['#c8a96e','#7eb8a0','#e07070','#7898d0','#b07eb8'];
const campSpend   = campaigns.map((c,i)=>({
  name:c,
  spend: data.filter(r=>r.campaign===c).reduce((s,r)=>s+r.spend,0),
  color: palette[i%palette.length]
}));
campSpend.sort((a,b)=>b.spend-a.spend);

const totalD = campSpend.reduce((s,c)=>s+c.spend,0);
const cx=80, cy=80, r=60, ri=38;
let angle=-Math.PI/2;
const donutSvg = document.getElementById('donutSvg');
campSpend.forEach(c=>{
  const sweep = (c.spend/totalD)*2*Math.PI;
  const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
  angle+=sweep;
  const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
  const xi1=cx+ri*Math.cos(angle-sweep), yi1=cy+ri*Math.sin(angle-sweep);
  const xi2=cx+ri*Math.cos(angle),       yi2=cy+ri*Math.sin(angle);
  const lg = sweep>Math.PI?1:0;
  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d",`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1} Z`);
  path.setAttribute("fill",c.color);
  path.setAttribute("opacity","0.9");
  donutSvg.appendChild(path);
});

// center text
const ct = document.createElementNS("http://www.w3.org/2000/svg","text");
ct.setAttribute("x","80"); ct.setAttribute("y","76");
ct.setAttribute("text-anchor","middle"); ct.setAttribute("font-family","DM Serif Display,serif");
ct.setAttribute("font-size","18"); ct.setAttribute("fill","#e8e4dc");
ct.textContent = `$${totalD.toFixed(0)}`;
donutSvg.appendChild(ct);
const cs = document.createElementNS("http://www.w3.org/2000/svg","text");
cs.setAttribute("x","80"); cs.setAttribute("y","92");
cs.setAttribute("text-anchor","middle"); cs.setAttribute("font-family","DM Sans,sans-serif");
cs.setAttribute("font-size","9"); cs.setAttribute("fill","#7a7e91"); cs.setAttribute("letter-spacing","1");
cs.textContent = "TOTAL SPEND";
donutSvg.appendChild(cs);

const legend = document.getElementById('donutLegend');
campSpend.forEach(c=>{
  legend.innerHTML+=`
    <div class="legend-item">
      <span class="legend-dot" style="background:${c.color}"></span>
      <span class="legend-name">${c.name}</span>
      <span class="legend-val">$${c.spend.toFixed(2)}</span>
    </div>`;
});

// ── Table ──
const tbody = document.getElementById('adTableBody');
data.forEach(r=>{
  const qr = r.qualRate!==null ? `
    <div class="qual-bar-mini">
      <div class="qual-track-mini"><div class="qual-fill-mini" style="width:${r.qualRate}%"></div></div>
      <span>${r.qualRate}%</span>
    </div>` : '<span class="td-muted">—</span>';
  tbody.innerHTML += `
    <tr>
      <td>${r.adSet}</td>
      <td><span class="role-pill">${r.role}</span></td>
      <td><span class="badge badge-${r.status}"><span class="badge-dot"></span>${r.status}</span></td>
      <td>${r.leads||'—'}</td>
      <td>${r.qualified||'—'}</td>
      <td>${qr}</td>
      <td class="td-muted">${r.impressions.toLocaleString()}</td>
      <td class="td-muted">${r.reach.toLocaleString()}</td>
      <td>${r.cpr!==null?'$'+r.cpr.toFixed(2):'<span class="td-muted">—</span>'}</td>
      <td>${r.spend>0?'$'+r.spend.toFixed(2):'<span class="td-muted">—</span>'}</td>
    </tr>`;
});

// ── Location Cards ──
const locGrid = document.getElementById('locationGrid');
campaigns.forEach((c,i)=>{
  const rows   = data.filter(r=>r.campaign===c);
  const leads  = rows.reduce((s,r)=>s+r.leads,0);
  const qual   = rows.reduce((s,r)=>s+r.qualified,0);
  const spend  = rows.reduce((s,r)=>s+r.spend,0);
  const impr   = rows.reduce((s,r)=>s+r.impressions,0);
  const reach  = rows.reduce((s,r)=>s+r.reach,0);
  const qr     = leads ? Math.round(qual/leads*100) : 0;
  const cpl    = leads ? spend/leads : 0;
  const active = rows.filter(r=>r.status==='active').length;
  locGrid.innerHTML += `
    <div class="location-card" style="animation-delay:${0.5+i*0.06}s">
      <div class="loc-name">Advena Living — ${c}</div>
      <div class="loc-stats">
        <div class="loc-stat-row"><span class="loc-stat-label">Total Leads</span><span class="loc-stat-val accent">${leads}</span></div>
        <div class="loc-stat-row"><span class="loc-stat-label">Qualified</span><span class="loc-stat-val">${qual}</span></div>
        <div class="loc-stat-row"><span class="loc-stat-label">Qual. Rate</span><span class="loc-stat-val green">${leads?qr+'%':'—'}</span></div>
        <div class="loc-stat-row"><span class="loc-stat-label">Total Spend</span><span class="loc-stat-val">$${spend.toFixed(2)}</span></div>
        <div class="loc-stat-row"><span class="loc-stat-label">Cost / Lead</span><span class="loc-stat-val">${leads?'$'+cpl.toFixed(2):'—'}</span></div>
        <div class="loc-stat-row"><span class="loc-stat-label">Impressions</span><span class="loc-stat-val">${impr.toLocaleString()}</span></div>
        <div class="loc-stat-row"><span class="loc-stat-label">Reach</span><span class="loc-stat-val">${reach.toLocaleString()}</span></div>
        <div class="loc-stat-row"><span class="loc-stat-label">Active Ad Sets</span><span class="loc-stat-val">${active} / ${rows.length}</span></div>
      </div>
    </div>`;
});
</script>
</body>
</html>
