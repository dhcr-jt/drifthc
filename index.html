<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Advena Living — Campaign Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #f2f2f2;
    color: #111;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 48px);
    max-width: 430px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  header {
    background: #111;
    color: #fff;
    padding: 20px 18px 18px;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #fff;
  }

  .fb-badge {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    background: #222;
    border-radius: 3px;
    padding: 3px 8px;
  }

  .header-period {
    font-size: 0.7rem;
    color: #777;
  }

  /* ── SUMMARY CARDS ── */
  .summary-section { padding: 14px 14px 6px; }

  .summary-title {
    font-size: 0.62rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .sum-card {
    background: #fff;
    border-radius: 8px;
    padding: 12px 12px 10px;
    border: 1px solid #e8e8e8;
  }

  .sum-card.wide {
    grid-column: span 3;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }

  .sum-card.wide .sum-item {
    padding: 10px 10px;
    border-right: 1px solid #f0f0f0;
  }

  .sum-card.wide .sum-item:last-child { border-right: none; }

  .sum-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    font-weight: 500;
    margin-bottom: 5px;
    white-space: normal;
    line-height: 1.3;
  }

  .sum-val {
    font-size: 1.25rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .sum-val.sm { font-size: 1.05rem; }

  /* ── FACILITY SECTION ── */
  .facilities-section { padding: 14px 14px 0; }

  .facility {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e5e5e5;
    margin-bottom: 12px;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Facility Header ── */
  .fac-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 14px;
    cursor: pointer;
    user-select: none;
    background: #fff;
  }

  .fac-header-left { flex: 1; min-width: 0; }

  .fac-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: #111;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fac-sub {
    font-size: 0.7rem;
    color: #888;
  }

  .fac-header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    margin-left: 10px;
  }

  .fac-leads-badge {
    background: #111;
    color: #fff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.72rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .chevron {
    width: 18px;
    height: 18px;
    color: #ccc;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }

  .chevron.open { transform: rotate(180deg); }

  /* ── Facility Totals Row ── */
  .fac-totals {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid #f0f0f0;
    border-bottom: 1px solid #f0f0f0;
    background: #fafafa;
  }

  .fac-tot {
    padding: 9px 10px;
    border-right: 1px solid #f0f0f0;
  }

  .fac-tot:last-child { border-right: none; }

  .ft-label {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #aaa;
    font-weight: 500;
    margin-bottom: 3px;
    white-space: normal;
    line-height: 1.3;
  }

  .ft-val {
    font-size: 0.85rem;
    font-weight: 600;
    color: #111;
  }

  /* ── Position Cards ── */
  .positions { padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 8px; }

  .pos-card { border: 1px solid #efefef; border-radius: 7px; overflow: hidden; }
  .pos-card.paused { opacity: 0.4; }

  .pos-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    background: #f7f7f7;
    border-bottom: 1px solid #efefef;
  }

  .pos-title-row { display: flex; align-items: center; gap: 7px; }

  .pos-pill {
    background: #111;
    color: #fff;
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .pos-pill.paused-pill { background: #ddd; color: #888; }

  .paused-label {
    font-size: 0.62rem;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .pos-spend-label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; }
  .pos-spend-val   { font-size: 0.88rem; font-weight: 600; color: #111; text-align: right; }

  /* Stat groups */
  .pos-stats { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }

  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-row.two-col { grid-template-columns: 1fr 1fr; }

  .stat-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #aaa;
    font-weight: 500;
    margin-bottom: 2px;
    white-space: normal;
    line-height: 1.3;
  }

  .stat-val { font-size: 0.85rem; font-weight: 600; color: #111; }
  .stat-val.dim { color: #ccc; font-weight: 400; }

  .qual-wrap { display: flex; flex-direction: column; gap: 4px; }

  .qual-bar-track { height: 4px; background: #ebebeb; border-radius: 2px; overflow: hidden; }
  .qual-bar-fill  { height: 100%; border-radius: 2px; background: #111; }

  .stat-divider { height: 1px; background: #f5f5f5; margin: 0 -12px; }

  /* ── Collapsed ── */
  .fac-body { display: block; }
  .fac-body.hidden { display: none; }

  /* ── Footer ── */
  footer {
    margin: 8px 14px 0;
    padding: 16px 0;
    border-top: 1px solid #e0e0e0;
    font-size: 0.67rem;
    color: #bbb;
    line-height: 1.9;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Advena Living</h1>
    <span class="fb-badge">Meta Ads</span>
  </div>
  <div class="header-period">Meta Recruiting Ads Weekly Report &nbsp;·&nbsp; Mar 17 – Apr 17, 2026</div>
</header>

<div class="summary-section">
  <div class="summary-title">Campaign Summary</div>
  <div class="summary-grid" id="summaryGrid"></div>
</div>

<div class="facilities-section">
  <div class="summary-title" style="margin-bottom:10px;">Facilities</div>
  <div id="facilities"></div>
</div>

<footer>
  Meta Ads Manager &nbsp;·&nbsp; All amounts in USD &nbsp;·&nbsp; Generated April 2, 2026
</footer>

<script>
const raw = [
  { facility:"On Woodlawn",    position:"CMA",       status:"active",   spend:20.94,  cpa:1.40,  leads:15, qual:15, qualRate:100,  cpqc:1.40,  interviews:1,  hires:0, cpi:20.94,  ith:0,    impressions:1946  },
  { facility:"On Woodlawn",    position:"CNA",       status:"inactive", spend:170.11, cpa:3.47,  leads:49, qual:49, qualRate:100,  cpqc:3.47,  interviews:18, hires:7, cpi:9.45,   ith:39,   impressions:12754 },
  { facility:"On Woodlawn",    position:"LPN",       status:"active",   spend:40.71,  cpa:8.14,  leads:5,  qual:4,  qualRate:80,   cpqc:10.18, interviews:0,  hires:0, cpi:null,   ith:null, impressions:3225  },
  { facility:"On Woodlawn",    position:"RN & LPN",  status:"inactive", spend:312.58, cpa:62.52, leads:5,  qual:5,  qualRate:100,  cpqc:62.52, interviews:0,  hires:0, cpi:null,   ith:null, impressions:15179 },
  { facility:"On Woodlawn",    position:"RN",        status:"active",   spend:4.07,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:0,  hires:0, cpi:null,   ith:null, impressions:192   },

  { facility:"On Tenth",       position:"CNA",       status:"active",   spend:257.65, cpa:3.90,  leads:66, qual:66, qualRate:100,  cpqc:3.90,  interviews:18, hires:5, cpi:14.31,  ith:28,   impressions:19851 },
  { facility:"On Tenth",       position:"CMA",       status:"active",   spend:59.78,  cpa:8.54,  leads:7,  qual:8,  qualRate:100,  cpqc:7.47,  interviews:4,  hires:0, cpi:14.95,  ith:0,    impressions:3275  },
  { facility:"On Tenth",       position:"RN & LPN",  status:"active",   spend:222.61, cpa:24.73, leads:9,  qual:9,  qualRate:100,  cpqc:24.73, interviews:1,  hires:0, cpi:222.61, ith:0,    impressions:12539 },

  { facility:"Clearwater",     position:"CNA",       status:"active",   spend:280.76, cpa:5.73,  leads:49, qual:40, qualRate:82,   cpqc:7.02,  interviews:12, hires:3, cpi:23.40,  ith:25,   impressions:20147 },
  { facility:"Clearwater",     position:"RN & LPN",  status:"active",   spend:237.54, cpa:15.84, leads:15, qual:6,  qualRate:40,   cpqc:39.59, interviews:4,  hires:2, cpi:59.39,  ith:50,   impressions:12736 },
  { facility:"Clearwater",     position:"CMA",       status:"inactive", spend:30.27,  cpa:6.05,  leads:5,  qual:5,  qualRate:100,  cpqc:6.05,  interviews:2,  hires:0, cpi:15.14,  ith:0,    impressions:1602  },

  { facility:"Fountainview",   position:"CNA",       status:"inactive", spend:179.57, cpa:4.28,  leads:42, qual:42, qualRate:100,  cpqc:4.28,  interviews:13, hires:1, cpi:13.81,  ith:8,    impressions:12868 },
  { facility:"Fountainview",   position:"CMA",       status:"inactive", spend:109.13, cpa:5.74,  leads:19, qual:16, qualRate:84,   cpqc:6.82,  interviews:4,  hires:0, cpi:27.28,  ith:0,    impressions:6907  },
  { facility:"Fountainview",   position:"RN & LPN",  status:"active",   spend:237.81, cpa:26.42, leads:9,  qual:9,  qualRate:100,  cpqc:26.42, interviews:1,  hires:0, cpi:237.81, ith:0,    impressions:13085 },

  { facility:"Bonner Springs", position:"CNA",       status:"active",   spend:148.36, cpa:4.36,  leads:34, qual:30, qualRate:88,   cpqc:4.95,  interviews:7,  hires:1, cpi:21.19,  ith:14,   impressions:9242  },
  { facility:"Bonner Springs", position:"RN",        status:"active",   spend:339.60, cpa:21.23, leads:16, qual:13, qualRate:81,   cpqc:26.12, interviews:1,  hires:0, cpi:339.60, ith:0,    impressions:15241 },
  { facility:"Bonner Springs", position:"CMA",       status:"active",   spend:79.06,  cpa:9.88,  leads:8,  qual:5,  qualRate:63,   cpqc:15.81, interviews:0,  hires:0, cpi:null,   ith:null, impressions:3905  },
];

const facilityOrder = ["On Woodlawn","On Tenth","Clearwater","Fountainview","Bonner Springs"];
const facilities    = facilityOrder.filter(f => raw.some(r => r.facility === f));

const totSpend      = raw.reduce((s,r) => s+r.spend, 0);
const totLeads      = raw.reduce((s,r) => s+r.leads, 0);
const totImpr       = raw.reduce((s,r) => s+r.impressions, 0);
const totQual       = raw.reduce((s,r) => s+r.qual, 0);
const totInterviews = raw.reduce((s,r) => s+(r.interviews||0), 0);
const totHires      = raw.reduce((s,r) => s+(r.hires||0), 0);
const overallQR     = totLeads ? Math.round(totQual/totLeads*100) : 0;
const avgCPA        = totLeads ? totSpend/totLeads : 0;
const avgCPI        = totInterviews ? totSpend/totInterviews : 0;
const overallITH    = totInterviews ? Math.round(totHires/totInterviews*100) : 0;

document.getElementById('summaryGrid').innerHTML = `
  <div class="sum-card">
    <div class="sum-label">Total Applicants</div>
    <div class="sum-val">${totLeads}</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Qual. Rate</div>
    <div class="sum-val">${overallQR}%</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Total Hires</div>
    <div class="sum-val">${totHires}</div>
  </div>
  <div class="sum-card wide">
    <div class="sum-item">
      <div class="sum-label">Avg Cost / Applicant</div>
      <div class="sum-val sm">$${avgCPA.toFixed(2)}</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Interviews</div>
      <div class="sum-val sm">${totInterviews}</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Avg Cost / Interview</div>
      <div class="sum-val sm">$${avgCPI.toFixed(2)}</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Interview to Hire</div>
      <div class="sum-val sm">${overallITH}%</div>
    </div>
  </div>`;

const container = document.getElementById('facilities');

facilities.forEach((fac, fi) => {
  const rows        = raw.filter(r => r.facility === fac);
  const fSpend      = rows.reduce((s,r) => s+r.spend, 0);
  const fLeads      = rows.reduce((s,r) => s+r.leads, 0);
  const fImpr       = rows.reduce((s,r) => s+r.impressions, 0);
  const fQual       = rows.reduce((s,r) => s+r.qual, 0);
  const fInterviews = rows.reduce((s,r) => s+(r.interviews||0), 0);
  const fHires      = rows.reduce((s,r) => s+(r.hires||0), 0);
  const fQR         = fLeads ? Math.round(fQual/fLeads*100) : null;
  const fCPA        = fLeads ? fSpend/fLeads : null;
  const fCPI        = fInterviews ? fSpend/fInterviews : null;
  const fITH        = fInterviews ? Math.round(fHires/fInterviews*100) : null;

  const posCards = rows.map(r => {
    const inactive = r.status === 'inactive';
    const f2 = v => v !== null && v !== undefined ? `$${v.toFixed(2)}` : `<span class="dim">—</span>`;
    const fn = v => v !== null && v !== undefined && v !== 0 ? v : `<span class="dim">—</span>`;

    const qualBlock = r.qualRate !== null && r.qualRate > 0 ? `
      <div class="qual-wrap">
        <div class="stat-val">${r.qualRate}%</div>
        <div class="qual-bar-track"><div class="qual-bar-fill" style="width:${Math.min(r.qualRate,100)}%"></div></div>
      </div>` : `<div class="stat-val dim">—</div>`;

    return `
      <div class="pos-card ${inactive ? 'paused' : ''}">
        <div class="pos-card-header">
          <div class="pos-title-row">
            <span class="pos-pill ${inactive ? 'paused-pill' : ''}">${r.position}</span>
            ${inactive ? '<span class="paused-label">Paused</span>' : ''}
          </div>
        </div>
        <div class="pos-stats">

          <div class="stat-row">
            <div class="stat-item">
              <div class="stat-label">Applicants</div>
              <div class="stat-val">${r.leads > 0 ? r.leads : '<span class="dim">—</span>'}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Qualified</div>
              <div class="stat-val">${r.qual > 0 ? r.qual : '<span class="dim">—</span>'}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Qual. Rate</div>
              ${qualBlock}
            </div>
          </div>

          <div class="stat-divider"></div>

          <div class="stat-row">
            <div class="stat-item">
              <div class="stat-label">Interviews</div>
              <div class="stat-val">${fn(r.interviews)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Hires</div>
              <div class="stat-val">${fn(r.hires)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Interview to Hire</div>
              <div class="stat-val">${r.ith !== null && r.ith !== undefined ? r.ith+'%' : '<span class="dim">—</span>'}</div>
            </div>
          </div>

          <div class="stat-divider"></div>

          <div class="stat-row">
            <div class="stat-item">
              <div class="stat-label">Cost / Applicant</div>
              <div class="stat-val">${f2(r.cpa)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Cost / Interview</div>
              <div class="stat-val">${f2(r.cpi)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Cost / Qual.</div>
              <div class="stat-val">${f2(r.cpqc)}</div>
            </div>
          </div>

          <div class="stat-divider"></div>

          <div class="stat-row two-col">
            <div class="stat-item">
              <div class="stat-label">Impressions</div>
              <div class="stat-val">${r.impressions.toLocaleString()}</div>
            </div>
          </div>

        </div>
      </div>`;
  }).join('');

  const el = document.createElement('div');
  el.className = 'facility';
  el.style.animationDelay = `${fi * 0.06}s`;
  el.innerHTML = `
    <div class="fac-header" onclick="toggleFac(this)">
      <div class="fac-header-left">
        <div class="fac-name">Advena Living — ${fac}</div>
        <div class="fac-sub">${fLeads} applicants &nbsp;·&nbsp; ${fImpr.toLocaleString()} impressions</div>
      </div>
      <div class="fac-header-right">
        <span class="fac-leads-badge">${fLeads} applicants</span>
        <svg class="chevron open" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 6 8 10 12 6"/>
        </svg>
      </div>
    </div>
    <div class="fac-body">
      <div class="fac-totals">
        <div class="fac-tot">
          <div class="ft-label">Cost / Applicant</div>
          <div class="ft-val">${fCPA ? '$'+fCPA.toFixed(2) : '—'}</div>
        </div>
        <div class="fac-tot">
          <div class="ft-label">Interviews</div>
          <div class="ft-val">${fInterviews || '—'}</div>
        </div>
        <div class="fac-tot">
          <div class="ft-label">Hires</div>
          <div class="ft-val">${fHires || '—'}</div>
        </div>
        <div class="fac-tot">
          <div class="ft-label">Interview to Hire</div>
          <div class="ft-val">${fITH !== null ? fITH+'%' : '—'}</div>
        </div>
      </div>
      <div class="positions">${posCards}</div>
    </div>`;
  container.appendChild(el);
});

function toggleFac(header) {
  const body    = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('hidden');
  chevron.classList.toggle('open');
}
</script>
</body>
</html>
