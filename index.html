<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Advena Living — Campaign Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #f2f2f2;
    color: #111;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 48px);
    max-width: 430px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  header {
    background: #111;
    color: #fff;
    padding: 20px 18px 18px;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #fff;
  }

  .fb-badge {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    background: #222;
    border-radius: 3px;
    padding: 3px 8px;
  }

  .header-period {
    font-size: 0.7rem;
    color: #777;
  }

  /* ── SUMMARY CARDS ── */
  .summary-section {
    padding: 14px 14px 6px;
  }

  .summary-title {
    font-size: 0.62rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .sum-card {
    background: #fff;
    border-radius: 8px;
    padding: 12px 12px 10px;
    border: 1px solid #e8e8e8;
  }

  .sum-card.wide {
    grid-column: span 3;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }

  .sum-card.wide .sum-item {
    padding: 10px 12px;
    border-right: 1px solid #f0f0f0;
  }

  .sum-card.wide .sum-item:last-child { border-right: none; }

  .sum-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    font-weight: 500;
    margin-bottom: 5px;
    white-space: nowrap;
  }

  .sum-val {
    font-size: 1.25rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .sum-val.sm { font-size: 1.05rem; }

  /* ── FACILITY SECTION ── */
  .facilities-section {
    padding: 14px 14px 0;
  }

  .facility {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e5e5e5;
    margin-bottom: 12px;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Facility Header ── */
  .fac-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 14px;
    cursor: pointer;
    user-select: none;
    background: #fff;
  }

  .fac-header-left { flex: 1; min-width: 0; }

  .fac-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: #111;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fac-sub {
    font-size: 0.7rem;
    color: #888;
  }

  .fac-header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    margin-left: 10px;
  }

  .fac-leads-badge {
    background: #111;
    color: #fff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.72rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .chevron {
    width: 18px;
    height: 18px;
    color: #ccc;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }

  .chevron.open { transform: rotate(180deg); }

  /* ── Facility Totals Row ── */
  .fac-totals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid #f0f0f0;
    border-bottom: 1px solid #f0f0f0;
    background: #fafafa;
  }

  .fac-tot {
    padding: 9px 12px;
    border-right: 1px solid #f0f0f0;
  }

  .fac-tot:last-child { border-right: none; }

  .ft-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #aaa;
    font-weight: 500;
    margin-bottom: 3px;
  }

  .ft-val {
    font-size: 0.85rem;
    font-weight: 600;
    color: #111;
  }

  /* ── Position Cards ── */
  .positions { padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 8px; }

  .pos-card {
    border: 1px solid #efefef;
    border-radius: 7px;
    overflow: hidden;
  }

  .pos-card.paused { opacity: 0.4; }

  .pos-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    background: #f7f7f7;
    border-bottom: 1px solid #efefef;
  }

  .pos-title-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .pos-pill {
    background: #111;
    color: #fff;
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .pos-pill.paused-pill {
    background: #ddd;
    color: #888;
  }

  .paused-label {
    font-size: 0.62rem;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .pos-spend-label {
    font-size: 0.72rem;
    color: #888;
  }

  .pos-spend-val {
    font-size: 0.88rem;
    font-weight: 600;
    color: #111;
  }

  /* Stats inside position card — two rows of labeled pairs */
  .pos-stats {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .stat-row.two-col { grid-template-columns: 1fr 1fr; }

  .stat-item { }

  .stat-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #aaa;
    font-weight: 500;
    margin-bottom: 2px;
    white-space: nowrap;
  }

  .stat-val {
    font-size: 0.85rem;
    font-weight: 600;
    color: #111;
  }

  .stat-val.dim { color: #ccc; font-weight: 400; }

  /* Qual rate bar */
  .qual-wrap { display: flex; flex-direction: column; gap: 4px; }

  .qual-bar-track {
    height: 4px;
    background: #ebebeb;
    border-radius: 2px;
    overflow: hidden;
  }

  .qual-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: #111;
  }

  /* Divider between stat rows */
  .stat-divider {
    height: 1px;
    background: #f5f5f5;
    margin: 0 -12px;
  }

  /* ── Collapsed ── */
  .fac-body { display: block; }
  .fac-body.hidden { display: none; }

  /* ── Footer ── */
  footer {
    margin: 8px 14px 0;
    padding: 16px 0;
    border-top: 1px solid #e0e0e0;
    font-size: 0.67rem;
    color: #bbb;
    line-height: 1.9;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Advena Living</h1>
    <span class="fb-badge">Meta Ads</span>
  </div>
  <div class="header-period">Meta Recruiting Ads Weekly Report &nbsp;·&nbsp; Mar 10 – Mar 20, 2026</div>
</header>

<div class="summary-section">
  <div class="summary-title">Campaign Summary</div>
  <div class="summary-grid" id="summaryGrid"></div>
</div>

<div class="facilities-section">
  <div class="summary-title" style="margin-bottom:10px;">Facilities</div>
  <div id="facilities"></div>
</div>

<footer>
  Meta Ads Manager &nbsp;·&nbsp; <br>
  All amounts in USD &nbsp;·&nbsp; Generated March 20, 2026
</footer>

<script>
const raw = [
  { facility:"Bonner Springs",  position:"CMA",        status:"active",   spend:34.60,  cpa:8.65,  leads:4,  qual:1,  qualRate:25,   cpqc:34.60, interviews:null, hires:null, impressions:1839 },
  { facility:"Bonner Springs",  position:"CNA",        status:"active",   spend:73.82,  cpa:3.52,  leads:21, qual:19, qualRate:90,   cpqc:3.89,  interviews:5,    hires:null, impressions:4914 },
  { facility:"Bonner Springs",  position:"RN",         status:"active",   spend:9.17,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:420  },

  { facility:"Clearwater",      position:"CMA",        status:"inactive", spend:25.19,  cpa:6.30,  leads:4,  qual:4,  qualRate:100,  cpqc:6.30,  interviews:null, hires:null, impressions:1378 },
  { facility:"Clearwater",      position:"CNA",        status:"inactive", spend:74.25,  cpa:4.13,  leads:18, qual:11, qualRate:61,   cpqc:6.75,  interviews:null, hires:null, impressions:5257 },
  { facility:"Clearwater",      position:"RNs & LPNs", status:"active",   spend:14.17,  cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:895  },
  { facility:"Clearwater",      position:"RN",         status:"inactive", spend:0.00,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:1    },

  { facility:"Fountainview",    position:"CMA",        status:"active",   spend:47.10,  cpa:3.93,  leads:12, qual:10, qualRate:83,   cpqc:4.71,  interviews:null, hires:null, impressions:3467 },
  { facility:"Fountainview",    position:"CNA",        status:"active",   spend:57.55,  cpa:3.39,  leads:17, qual:17, qualRate:100,  cpqc:3.39,  interviews:null, hires:null, impressions:4544 },
  { facility:"Fountainview",    position:"LPN",        status:"inactive", spend:2.83,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:154  },
  { facility:"Fountainview",    position:"RNs & LPNs", status:"active",   spend:0.54,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:30   },
  { facility:"Fountainview",    position:"RN",         status:"inactive", spend:0.10,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:13   },

  { facility:"On Tenth",        position:"CMA",        status:"active",   spend:5.20,   cpa:5.20,  leads:1,  qual:1,  qualRate:100,  cpqc:5.20,  interviews:1,    hires:null, impressions:276  },
  { facility:"On Tenth",        position:"CNA",        status:"active",   spend:110.44, cpa:2.83,  leads:39, qual:38, qualRate:97,   cpqc:2.91,  interviews:10,   hires:1,    impressions:8905 },
  { facility:"On Tenth",        position:"RNs & LPNs", status:"inactive", spend:2.26,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:140  },

  { facility:"On Woodlawn",     position:"CNA",        status:"active",   spend:96.79,  cpa:3.12,  leads:31, qual:31, qualRate:100,  cpqc:3.12,  interviews:1,    hires:null, impressions:6968 },
  { facility:"On Woodlawn",     position:"RNs & LPNs", status:"active",   spend:22.31,  cpa:22.31, leads:1,  qual:1,  qualRate:100,  cpqc:22.31, interviews:null, hires:null, impressions:1307 },
];

const facilities    = [...new Set(raw.map(r => r.facility))];
const totSpend      = raw.reduce((s,r) => s+r.spend, 0);
const totLeads      = raw.reduce((s,r) => s+r.leads, 0);
const totImpr       = raw.reduce((s,r) => s+r.impressions, 0);
const totQual       = raw.reduce((s,r) => s+r.qual, 0);
const totInterviews = raw.reduce((s,r) => s+(r.interviews||0), 0);
const totHires      = raw.reduce((s,r) => s+(r.hires||0), 0);
const overallQR     = totLeads ? Math.round(totQual/totLeads*100) : 0;
const avgCPA        = totLeads ? totSpend/totLeads : 0;

// Summary grid
document.getElementById('summaryGrid').innerHTML = `
  <div class="sum-card">
    <div class="sum-label">Total Spent</div>
    <div class="sum-val">$${totSpend.toFixed(2)}</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Total Applicants</div>
    <div class="sum-val">${totLeads}</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Qual. Rate</div>
    <div class="sum-val">${overallQR}%</div>
  </div>
  <div class="sum-card wide">
    <div class="sum-item">
      <div class="sum-label">Avg Cost / Applicant</div>
      <div class="sum-val sm">$${avgCPA.toFixed(2)}</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Interviews</div>
      <div class="sum-val sm">${totInterviews}</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Hires</div>
      <div class="sum-val sm">${totHires}</div>
    </div>
  </div>`;

// Facilities
const container = document.getElementById('facilities');

facilities.forEach((fac, fi) => {
  const rows        = raw.filter(r => r.facility === fac);
  const fSpend      = rows.reduce((s,r) => s+r.spend, 0);
  const fLeads      = rows.reduce((s,r) => s+r.leads, 0);
  const fImpr       = rows.reduce((s,r) => s+r.impressions, 0);
  const fQual       = rows.reduce((s,r) => s+r.qual, 0);
  const fInterviews = rows.reduce((s,r) => s+(r.interviews||0), 0);
  const fHires      = rows.reduce((s,r) => s+(r.hires||0), 0);
  const fQR         = fLeads ? Math.round(fQual/fLeads*100) : null;
  const fCPA        = fLeads ? fSpend/fLeads : null;

  const posCards = rows.map(r => {
    const inactive = r.status === 'inactive';

    const qualBlock = r.qualRate !== null ? `
      <div class="qual-wrap">
        <div class="stat-val">${r.qualRate}%</div>
        <div class="qual-bar-track"><div class="qual-bar-fill" style="width:${r.qualRate}%"></div></div>
      </div>` : `<div class="stat-val dim">—</div>`;

    return `
      <div class="pos-card ${inactive ? 'paused' : ''}">
        <div class="pos-card-header">
          <div class="pos-title-row">
            <span class="pos-pill ${inactive ? 'paused-pill' : ''}">${r.position}</span>
            ${inactive ? '<span class="paused-label">Paused</span>' : ''}
          </div>
          <div style="text-align:right">
            <div class="pos-spend-label">Amount Spent</div>
            <div class="pos-spend-val">$${r.spend.toFixed(2)}</div>
          </div>
        </div>
        <div class="pos-stats">
          <div class="stat-row">
            <div class="stat-item">
              <div class="stat-label">Applicants</div>
              <div class="stat-val">${r.leads > 0 ? r.leads : '<span class="dim">—</span>'}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Qualified</div>
              <div class="stat-val">${r.qual > 0 ? r.qual : '<span class="dim">—</span>'}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Qual. Rate</div>
              ${qualBlock}
            </div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-row">
            <div class="stat-item">
              <div class="stat-label">Interviews</div>
              <div class="stat-val">${r.interviews ? r.interviews : '<span class="dim">—</span>'}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Hires</div>
              <div class="stat-val">${r.hires ? r.hires : '<span class="dim">—</span>'}</div>
            </div>
            <div class="stat-item"></div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-row">
            <div class="stat-item">
              <div class="stat-label">Cost / Application</div>
              <div class="stat-val">${r.cpa !== null ? '$'+r.cpa.toFixed(2) : '<span class="dim">—</span>'}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Cost / Qual.</div>
              <div class="stat-val">${r.cpqc !== null ? '$'+r.cpqc.toFixed(2) : '<span class="dim">—</span>'}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Impressions</div>
              <div class="stat-val">${r.impressions.toLocaleString()}</div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  const el = document.createElement('div');
  el.className = 'facility';
  el.style.animationDelay = `${fi * 0.06}s`;
  el.innerHTML = `
    <div class="fac-header" onclick="toggleFac(this)">
      <div class="fac-header-left">
        <div class="fac-name">Advena Living — ${fac}</div>
        <div class="fac-sub">$${fSpend.toFixed(2)} spent &nbsp;·&nbsp; ${fImpr.toLocaleString()} impressions</div>
      </div>
      <div class="fac-header-right">
        <span class="fac-leads-badge">${fLeads} applicants</span>
        <svg class="chevron open" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 6 8 10 12 6"/>
        </svg>
      </div>
    </div>
    <div class="fac-body">
      <div class="fac-totals">
        <div class="fac-tot">
          <div class="ft-label">Cost / Applicant</div>
          <div class="ft-val">${fCPA ? '$'+fCPA.toFixed(2) : '—'}</div>
        </div>
        <div class="fac-tot">
          <div class="ft-label">Interviews</div>
          <div class="ft-val">${fInterviews || '—'}</div>
        </div>
        <div class="fac-tot">
          <div class="ft-label">Qual. Rate</div>
          <div class="ft-val">${fQR !== null ? fQR+'%' : '—'}</div>
        </div>
      </div>
      <div class="positions">${posCards}</div>
    </div>`;
  container.appendChild(el);
});

function toggleFac(header) {
  const body    = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('hidden');
  chevron.classList.toggle('open');
}
</script>
</body>
</html>
